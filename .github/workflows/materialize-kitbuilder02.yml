name: Materialize KitBuilder02 seed

on:
  push:
    paths:
      - '.seed/parts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materialize scaffold
        run: |
          set -euxo pipefail
          cat .seed/parts/*.b64 | base64 -d > /tmp/kitbuilder02-build.tgz
          tar -xzf /tmp/kitbuilder02-build.tgz -C "$GITHUB_WORKSPACE"
          rm -rf .seed
          rm -f push-test.txt tree-test.txt
          rm -f .github/workflows/materialize-kitbuilder02.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No scaffold changes to commit."
            exit 0
          fi
          git commit -m "Build peer fabric and secure ONNX kits"
          git push
